name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: tar.gz
          # Pinned label matches hosted Windows Server 2025 (MSVC); see windows/Windows2025-Readme.md in actions/runner-images
          - os: windows-2025
            target: x86_64-pc-windows-msvc
            suffix: zip
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            suffix: tar.gz

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target (Intel macOS cross-compile)
        if: matrix.target == 'x86_64-apple-darwin'
        run: rustup target add x86_64-apple-darwin

      - name: Build release binary
        run: |
          set -euo pipefail
          if [ "${{ matrix.target }}" = "x86_64-apple-darwin" ]; then
            cargo build --release --target x86_64-apple-darwin
          else
            cargo build --release
          fi

      - name: Strip binary (Unix)
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          if [ "${{ matrix.target }}" = "x86_64-apple-darwin" ]; then
            strip "target/x86_64-apple-darwin/release/specify"
          else
            strip target/release/specify
          fi

      - name: Package archive
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          STEM="specify-v${VERSION}-${{ matrix.target }}"
          if [ "${{ matrix.target }}" = "x86_64-apple-darwin" ]; then
            BIN="target/x86_64-apple-darwin/release/specify"
          else
            BIN="target/release/specify"
          fi
          if [[ "${{ runner.os }}" == "Windows" ]]; then BIN="$BIN.exe"; fi
          mkdir -p "pack/$STEM"
          cp "$BIN" "pack/$STEM/"
          cd pack
          if [[ "${{ matrix.suffix }}" == "zip" ]]; then
            tar -a -c -f "../${STEM}.zip" "$STEM"
          else
            tar czf "../${STEM}.tar.gz" "$STEM"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: specify-v*.*

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: assets
          pattern: binary-*
          merge-multiple: true

      - name: Write SHA256 checksums
        shell: bash
        run: |
          set -euo pipefail
          cd assets
          shopt -s nullglob
          for f in specify-v*.tar.gz specify-v*.zip; do
            [ -f "$f" ] || continue
            sha256sum "$f" > "$f.sha256"
          done

      - uses: softprops/action-gh-release@v2
        with:
          files: assets/*
          generate_release_notes: true
